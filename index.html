<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apple SARL — Defect List PDF Importer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6;
    --border: #ddd9d0; --border-strong: #bbb6ac;
    --text: #1a1916; --text-muted: #7a766e; --text-faint: #aaa59c;
    --accent: #2a5298; --accent-bg: #eef2fb; --accent-border: #b8c8ea; --accent-text: #1a3a7a;
    --mono: 'DM Mono', monospace; --sans: 'Sora', sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 18px; height: 18px; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-top: 1px; }

  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  .upload-zone { border: 1.5px dashed var(--border-strong); border-radius: var(--radius); padding: 48px 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
  .upload-zone input { display: none; }
  .upload-icon { width: 56px; height: 56px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; border: 1px solid var(--border); transition: all 0.2s; }
  .upload-zone:hover .upload-icon, .upload-zone.drag-over .upload-icon { background: var(--accent-bg); border-color: var(--accent-border); }
  .upload-icon svg { width: 24px; height: 24px; color: var(--text-muted); transition: color 0.2s; }
  .upload-zone:hover .upload-icon svg, .upload-zone.drag-over .upload-icon svg { color: var(--accent); }
  .upload-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .upload-sub { font-size: 12px; color: var(--text-muted); }

  .status-wrap { margin-top: 16px; }
  .status-text { font-size: 13px; color: var(--text-muted); font-family: var(--mono); min-height: 20px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 28px; margin-bottom: 16px; }
  .toolbar-left { display: flex; align-items: baseline; gap: 10px; }
  .section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
  .count-badge { font-size: 11px; font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; color: var(--text-muted); }
  .toolbar-right { display: flex; gap: 8px; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); border-color: var(--border-strong); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1e3f80; border-color: #1e3f80; }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .items-list { display: flex; flex-direction: column; gap: 12px; }
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: fadeIn 0.25s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .item-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .item-num { font-family: var(--mono); font-size: 12px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; color: var(--text-muted); min-width: 32px; text-align: center; }
  .room-tag { font-size: 13px; font-weight: 600; background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-border); border-radius: 4px; padding: 2px 10px; font-family: var(--mono); }
  .page-tag { font-size: 11px; font-family: var(--mono); color: var(--text-faint); margin-left: auto; }

  .item-body { padding: 14px 16px; display: flex; gap: 20px; align-items: flex-start; }
  .item-desc { flex: 1; min-width: 0; }
  .desc-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .desc-text { font-size: 14px; color: var(--text); line-height: 1.65; }

  .item-photo { flex-shrink: 0; }
  .photo-thumb { width: 180px; height: 135px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: zoom-in; display: block; transition: transform 0.15s, border-color 0.15s; }
  .photo-thumb:hover { transform: scale(1.03); border-color: var(--accent-border); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 16px; }
  .empty-state p { font-size: 13px; margin-top: 8px; }

  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.86); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; backdrop-filter: blur(6px); }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: var(--radius); animation: zoomIn 0.18s ease; }
  @keyframes zoomIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #lightbox-close { position: fixed; top: 20px; right: 24px; width: 36px; height: 36px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  #lightbox-close:hover { background: rgba(255,255,255,0.28); }

  @media (max-width: 600px) {
    header { padding: 16px; } main { padding: 20px 16px 48px; } .upload-zone { padding: 32px 16px; }
    .item-body { flex-direction: column-reverse; } .photo-thumb { width: 100%; height: 220px; }
  }
</style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="放大图片" />
</div>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
      <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.5"/>
      <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.5"/>
      <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" fill-opacity="0.9"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Defect List PDF Importer</div>
    <div class="header-sub">Apple SARL Phase 5 · Completion Inspection</div>
  </div>
</header>

<main>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="application/pdf" />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="upload-title">点击选择或拖入 PDF 文件</div>
    <div class="upload-sub">每页格式：房间号＋描述文字（如 3118消火栓门磕碰）＋照片</div>
  </div>

  <div class="status-wrap">
    <div class="status-text" id="status-text">等待上传文件…</div>
    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="results-area" style="display:none">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="section-title">解析结果</span>
        <span class="count-badge" id="count-badge">0 条</span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-primary" id="export-btn" onclick="exportXlsx()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出 XLSX
        </button>
        <button class="btn" onclick="clearAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          清除
        </button>
      </div>
    </div>
    <div class="items-list" id="items-list"></div>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa59c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <strong>未找到有效缺陷条目</strong>
    <p>请确认 PDF 每页包含文字描述和照片。</p>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let parsedItems = [];

// ── Drag & Drop ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') processPDF(f);
  else alert('请上传 PDF 格式的文件');
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processPDF(fileInput.files[0]); });

function setStatus(msg, pct) {
  document.getElementById('status-text').textContent = msg;
  const track = document.getElementById('progress-track');
  if (pct != null) { track.style.display = 'block'; document.getElementById('progress-fill').style.width = pct + '%'; }
  else { track.style.display = 'none'; }
}

// ── Main processing ──
async function processPDF(file) {
  parsedItems = [];
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('items-list').innerHTML = '';
  setStatus('正在读取 PDF…', 5);

  let pdf;
  try {
    pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  } catch(e) { setStatus('PDF 读取失败：' + e.message); return; }

  const total = pdf.numPages;
  setStatus(`共 ${total} 页，开始解析…`, 10);

  for (let p = 1; p <= total; p++) {
    setStatus(`处理第 ${p} / ${total} 页…`, 10 + Math.round((p / total) * 78));
    const page = await pdf.getPage(p);

    // ── Extract text ──
    // PDF format per page: one label at top AND same label repeated at bottom
    // Text content like: "3118" + "消火栓门磕碰" (two separate spans on same Y)
    const tc = await page.getTextContent();
    const vp1 = page.getViewport({ scale: 1 });
    const pageH = vp1.height;

    // Collect spans, convert to top-down Y
    const spans = tc.items
      .filter(i => i.str && i.str.trim())
      .map(i => ({ text: i.str.trim(), y: pageH - i.transform[5] }))
      .sort((a, b) => a.y - b.y);

    // Group into lines (spans within 4px Y of each other → same line)
    const lines = [];
    for (const sp of spans) {
      const last = lines[lines.length - 1];
      if (last && Math.abs(sp.y - last.y) < 4) {
        last.text += sp.text;
      } else {
        lines.push({ y: sp.y, text: sp.text });
      }
    }

    // Normalize CJK radical/component characters that PDF fonts encode incorrectly.
    // Kangxi Radicals (U+2F00–U+2FFF) → NFKC fixes them.
    // CJK Radicals Supplement (U+2E80–U+2EFF) → manual map for common ones.
    const CJK_RADICAL_MAP = {
      '\u2E80':'工','\u2E81':'口','\u2E82':'囗','\u2E83':'土','\u2E84':'士',
      '\u2E85':'夂','\u2E86':'大','\u2E87':'女','\u2E88':'子','\u2E89':'宀',
      '\u2E8A':'小','\u2E8B':'尢','\u2E8C':'尸','\u2E8D':'屮','\u2E8E':'山',
      '\u2E8F':'巛','\u2E90':'工','\u2E91':'己','\u2E92':'巾','\u2E93':'干',
      '\u2E94':'幺','\u2E95':'广','\u2E96':'廴','\u2E97':'廾','\u2E98':'弋',
      '\u2E99':'弓','\u2E9B':'彡','\u2E9C':'彳','\u2E9D':'心','\u2E9E':'戈',
      '\u2E9F':'母','\u2EA0':'比','\u2EA1':'毛','\u2EA2':'氏','\u2EA3':'气',
      '\u2EA4':'水','\u2EA5':'火','\u2EA6':'爪','\u2EA7':'父','\u2EA8':'爻',
      '\u2EA9':'玉','\u2EAA':'瓜','\u2EAB':'瓦','\u2EAC':'甘','\u2EAD':'生',
      '\u2EAE':'用','\u2EAF':'田','\u2EB0':'疋','\u2EB1':'疒','\u2EB2':'白',
      '\u2EB3':'皮','\u2EB4':'皿','\u2EB5':'目','\u2EB6':'矛','\u2EB7':'矢',
      '\u2EB8':'石','\u2EB9':'示','\u2EBA':'禾','\u2EBB':'穴','\u2EBC':'立',
      '\u2EBD':'竹','\u2EBE':'米','\u2EBF':'糸','\u2EC0':'缶','\u2EC1':'网',
      '\u2EC2':'羊','\u2EC3':'羽','\u2EC4':'老','\u2EC5':'而','\u2EC6':'耒',
      '\u2EC7':'耳','\u2EC8':'肉','\u2EC9':'臣','\u2ECA':'自','\u2ECB':'至',
      '\u2ECC':'臼','\u2ECD':'舌','\u2ECE':'舛','\u2ECF':'舟','\u2ED0':'艮',
      '\u2ED1':'色','\u2ED2':'艸','\u2ED3':'虍','\u2ED4':'门','\u2ED5':'血',
      '\u2ED6':'行','\u2ED7':'衣','\u2ED8':'見','\u2ED9':'角','\u2EDA':'言',
      '\u2EDB':'谷','\u2EDC':'豆','\u2EDD':'食','\u2EDE':'首','\u2EDF':'香',
      '\u2EE0':'馬','\u2EE1':'骨','\u2EE2':'高','\u2EE3':'髟','\u2EE4':'鬥',
      '\u2EE5':'鬯','\u2EE6':'鬲','\u2EE7':'鬼','\u2EE8':'魚','\u2EE9':'鳥',
      '\u2EEA':'鹵','\u2EEB':'鹿','\u2EEC':'麥','\u2EED':'麻','\u2EEE':'黃',
      '\u2EEF':'黍','\u2EF0':'黑','\u2EF1':'黹','\u2EF2':'黽','\u2EF3':'龟',
    };
    function normalizeCJK(str) {
      // First apply NFKC to fix Kangxi Radicals (2F00-2FFF)
      let s = str.normalize('NFKC');
      // Then replace any remaining CJK Radicals Supplement chars
      return s.replace(/[\u2E80-\u2EFF]/g, ch => CJK_RADICAL_MAP[ch] || ch);
    }

    // Find the label line: digits immediately followed by Chinese/text
    let room = '', description = '';
    for (const line of lines) {
      const normalized = normalizeCJK(line.text);
      // Pattern: leading digits = room number, rest = description
      const m = normalized.match(/^(\d+)\s*(.+)$/);
      if (m) {
        room = m[1];
        description = m[2].trim();
        break;
      }
    }
    // Fallback: first line as-is
    if (!room && lines.length > 0) {
      room = lines[0].text;
      description = lines.slice(1).map(l => l.text).join(' ') || '（无描述）';
    }
    if (!description) description = '（无描述）';

    // ── Extract largest embedded image ──
    let imageDataUrl = null;
    let imgW = 0, imgH = 0;
    try {
      const ops = await page.getOperatorList();
      const seen = new Set();
      const imgNames = [];
      for (let i = 0; i < ops.fnArray.length; i++) {
        if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
          const n = ops.argsArray[i][0];
          if (!seen.has(n)) { seen.add(n); imgNames.push(n); }
        }
      }

      let bestImg = null, bestArea = 0;
      for (const name of imgNames) {
        try {
          const img = await page.objs.get(name);
          if (img && img.data) {
            const area = img.width * img.height;
            if (area > bestArea) { bestArea = area; bestImg = img; }
          }
        } catch(_) {}
      }

      if (bestImg && bestImg.width > 100) {
        const c = document.createElement('canvas');
        c.width = bestImg.width; c.height = bestImg.height;
        const ctx = c.getContext('2d');
        const id = ctx.createImageData(bestImg.width, bestImg.height);
        id.data.set(bestImg.data);
        ctx.putImageData(id, 0, 0);
        imageDataUrl = c.toDataURL('image/jpeg', 0.88);
        imgW = bestImg.width;
        imgH = bestImg.height;
      }
    } catch(_) {}

    // Fallback: render page crop (top ~83% where the photo lives)
    if (!imageDataUrl) {
      const scale = 1.6;
      const vpS = page.getViewport({ scale });
      const c = document.createElement('canvas');
      c.width = vpS.width;
      c.height = Math.round(vpS.height * 0.83);
      await page.render({ canvasContext: c.getContext('2d'), viewport: vpS }).promise;
      imageDataUrl = c.toDataURL('image/jpeg', 0.80);
      imgW = c.width; imgH = c.height;
    }

    parsedItems.push({ id: p, room, description, image: imageDataUrl, imgW, imgH, page: p });
  }

  setStatus('渲染结果…', 92);
  if (!parsedItems.length) {
    document.getElementById('empty-state').style.display = 'block';
    setStatus('解析完成，未提取到内容。');
    return;
  }

  renderItems(parsedItems);
  document.getElementById('results-area').style.display = 'block';
  document.getElementById('count-badge').textContent = parsedItems.length + ' 条';
  setStatus(`✓ 解析完成 — ${parsedItems.length} 条缺陷记录，共 ${total} 页`);
}

// ── Render ──
function renderItems(items) {
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.style.animationDelay = Math.min(idx * 35, 260) + 'ms';
    const photoHtml = item.image
      ? `<img class="photo-thumb" src="${item.image}" alt="照片" title="点击放大" onclick="openLightbox(this.src)" />`
      : `<div style="width:180px;height:135px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-faint);">无图片</div>`;
    card.innerHTML = `
      <div class="item-header">
        <span class="item-num">${item.id}</span>
        <span class="room-tag">${escHtml(item.room)}</span>
        <span style="font-size:13px;color:var(--text-muted);margin-left:8px;">${escHtml(item.description)}</span>
        <span class="page-tag">p.${item.page}</span>
      </div>
      <div class="item-body">
        <div class="item-desc">
          <div class="desc-label">缺陷描述</div>
          <div class="desc-text">${escHtml(item.description)}</div>
        </div>
        <div class="item-photo">${photoHtml}</div>
      </div>`;
    list.appendChild(card);
  });
}

function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function clearAll() {
  parsedItems = [];
  document.getElementById('items-list').innerHTML = '';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  setStatus('等待上传文件…');
  fileInput.value = '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Export XLSX with real images embedded ──
async function exportXlsx() {
  if (!parsedItems.length) return;
  const btn = document.getElementById('export-btn');
  btn.disabled = true; btn.textContent = '正在生成…';

  try {
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Defect List Tool';
    const ws = wb.addWorksheet('命名');

    ws.columns = [
      {width:8},{width:24},{width:40},{width:50},{width:44},
      {width:44},{width:12},{width:15},{width:18},{width:11},
      {width:14},{width:13},{width:20},{width:28}
    ];

    function sc(cell, opts={}) {
      cell.font = { name:'Arial', size: opts.sz||10, bold:!!opts.bold };
      // Default: all text centered both horizontally and vertically
      cell.alignment = {
        vertical:   opts.va || 'middle',
        horizontal: opts.ha || 'center',
        wrapText: true
      };
      if (opts.fill) cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:opts.fill} };
      cell.border = {
        top:   {style:'thin', color:{argb:'FF888888'}},
        left:  {style:'thin', color:{argb:'FF888888'}},
        bottom:{style:'thin', color:{argb:'FF888888'}},
        right: {style:'thin', color:{argb:'FF888888'}}
      };
    }

    // Title rows 1-4
    ws.mergeCells('A1:N4');
    const tc = ws.getCell('A1');
    tc.value = 'APPLE SARL PHASE 5 - Completion Inspection Defect List';
    tc.font = {name:'Arial',size:14,bold:true};
    tc.alignment = {vertical:'middle',horizontal:'center',wrapText:true};
    tc.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFD9E1F2'}};
    [1,2,3,4].forEach(r => ws.getRow(r).height = 18);

    // Row 5 headers
    ws.getRow(5).height = 22;
    Object.entries({
      A5:'Item', B5:'Area/Rm', C5:'Defect Details', H5:'Responsibility',
      I5:'Rectification Detail',
      M5:'Ranking\nA: High. Must be corrected before Project Handover\nB: Medium. Negotiation before Project Handover\nC: Low. Correction After Project Handover',
      N5:'Remark'
    }).forEach(([addr,val]) => { const c=ws.getCell(addr); c.value=val; sc(c,{bold:true,fill:'FFBDD7EE'}); });

    ws.mergeCells('A5:A6'); ws.mergeCells('B5:B6'); ws.mergeCells('C5:G5');
    ws.mergeCells('H5:H6'); ws.mergeCells('I5:L5'); ws.mergeCells('M5:M6'); ws.mergeCells('N5:N6');

    // Row 6 sub-headers
    ws.getRow(6).height = 60;
    Object.entries({
      C6:'Description', D6:'Photos Taken Before Rectification',
      E6:'Elevation/Layout', F6:'Photos Taken After Rectification',
      G6:'Profession', I6:'Planned Close Date',
      J6:'Status\nO: Open\nG: On Going\nC: Closed',
      K6:'Inspector', L6:'Actual Close Date'
    }).forEach(([addr,val]) => { const c=ws.getCell(addr); c.value=val; sc(c,{bold:true,fill:'FFBDD7EE'}); });

    // ── Data rows ──
    const R0 = 7;
    const ROW_H = 180; // row height in points

    // Convert Excel units to pixels for aspect-ratio calculation:
    // Col width "chars" × 7 ≈ pixels; Row height "pt" × (96/72) ≈ pixels
    const COL_D_CHARS = 50;
    const COL_D_PX = COL_D_CHARS * 7;          // ≈ 350px
    const ROW_PX    = ROW_H * (96 / 72);        // ≈ 240px
    const PX_PER_COL_UNIT = COL_D_PX / COL_D_CHARS; // = 7
    const PX_PER_ROW_UNIT = ROW_PX / ROW_H;         // ≈ 1.333

    const INSET_COL = 0.05; // col-unit inset from border
    const INSET_ROW = 0.05; // row-unit inset from border

    for (let i = 0; i < parsedItems.length; i++) {
      const item = parsedItems[i];
      const rn = R0 + i;
      const ri = rn - 1; // 0-based
      ws.getRow(rn).height = ROW_H;

      // A: Item number
      const ca = ws.getCell(rn, 1); ca.value = item.id; sc(ca);
      // B: Room
      const cb = ws.getCell(rn, 2); cb.value = item.room; sc(cb, {bold:true});
      // C: Description
      const cc = ws.getCell(rn, 3); cc.value = item.description; sc(cc);
      // J: Status
      const cj = ws.getCell(rn, 10); cj.value = 'O'; sc(cj);
      // All other data cells
      [4,5,6,7,8,9,11,12,13,14].forEach(col => sc(ws.getCell(rn, col)));

      // D: embed photo preserving aspect ratio, centered inside cell
      if (item.image) {
        try {
          const base64 = item.image.split(',')[1];
          const imgId = wb.addImage({ base64, extension: 'jpeg' });

          // Available area inside the cell (excluding INSET on both sides)
          const availW = COL_D_PX - INSET_COL * 2 * PX_PER_COL_UNIT;
          const availH = ROW_PX   - INSET_ROW * 2 * PX_PER_ROW_UNIT;

          // Source aspect ratio
          const srcW = item.imgW || 3;
          const srcH = item.imgH || 4;
          const srcRatio = srcW / srcH;
          const cellRatio = availW / availH;

          let fitW, fitH;
          if (srcRatio > cellRatio) {
            fitW = availW;
            fitH = availW / srcRatio;
          } else {
            fitH = availH;
            fitW = availH * srcRatio;
          }

          // Center the fitted image inside the available area
          const hOffsetPx = (availW - fitW) / 2;
          const vOffsetPx = (availH - fitH) / 2;

          const tlCol = 3 + INSET_COL + hOffsetPx / PX_PER_COL_UNIT;
          const tlRow = ri + INSET_ROW + vOffsetPx / PX_PER_ROW_UNIT;

          ws.addImage(imgId, {
            tl:  { col: tlCol, row: tlRow },
            ext: { width: Math.round(fitW), height: Math.round(fitH) },
            editAs: 'oneCell'
          });
        } catch(e) {
          ws.getCell(rn, 4).value = '[图片嵌入失败]';
        }
      }
    }

    // Note row
    const noteR = R0 + parsedItems.length;
    ws.mergeCells(`A${noteR}:N${noteR+2}`);
    ws.getCell(`A${noteR}`).value = 'Note：';
    ws.getCell(`A${noteR}`).font = {name:'Arial',size:10};
    [noteR, noteR+1, noteR+2].forEach(r => ws.getRow(r).height = 15);

    const buf = await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), 'Defect_List_Filled.xlsx');

  } catch(err) {
    alert('导出失败：' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 导出 XLSX`;
  }
}
</script>
